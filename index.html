<!DOCTYPE html>

<head>

    <title>Alma - Briefing Criativo</title>
    <link rel="stylesheet" href="style.css">
    <!-- Ícone para a aba (opcional) -->

</head>
<body>

    <header>
        <h1>ALMA</h1>
